# ── Environment identity ──────────────────────────────────────
environment: dev
replicaCount: 1

# ── Image ─────────────────────────────────────────────────────
image:
  repository: acrdevopsai2834.azurecr.io/game-2048
  tag: "latest"
  pullPolicy: Always

# ── Service ───────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# ── Ingress ───────────────────────────────────────────────────
ingress:
  enabled: false

# ── Resources ─────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# ── Probes ────────────────────────────────────────────────────
livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10

# ── App config ────────────────────────────────────────────────
appEnv: dev
appVersion: "1.0.0"